<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">ROOM/50 sample floor plan</title>
  <desc id="desc">A ten by five metre accessible café concept plan with entrance, service counter, seating, accessible WC and a continuous route.</desc>
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#77776f" stroke-width="1" opacity=".16"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="m0 0 10 5-10 5z" fill="#171916"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="#f6f2e8"/>
  <rect width="1000" height="500" fill="url(#grid)"/>
  <g stroke="#171916" stroke-width="8" fill="none">
    <path d="M24 24H976V476H24V24Z"/>
    <path d="M24 476h160m110 0h682"/>
  </g>
  <path d="M184 476a110 110 0 0 1 110-110" fill="none" stroke="#bd593e" stroke-width="4" stroke-dasharray="8 6"/>
  <path d="M184 476h110" stroke="#171916" stroke-width="5"/>

  <g font-family="ui-monospace,Consolas,monospace" fill="#171916">
    <text x="36" y="54" font-size="17" font-weight="700">ROOM/50 · SAMPLE PLAN · 10 × 5m</text>
    <text x="38" y="464" font-size="13">STEP-FREE ENTRY</text>
  </g>

  <g id="wc">
    <path d="M24 24h235v210H24" fill="#dfdbd0" stroke="#171916" stroke-width="5"/>
    <path d="M259 146v88h-88" fill="none" stroke="#171916" stroke-width="5"/>
    <path d="M171 234a88 88 0 0 1 88-88" fill="none" stroke="#bd593e" stroke-width="3" stroke-dasharray="7 6"/>
    <ellipse cx="86" cy="92" rx="29" ry="38" fill="#fffdf7" stroke="#171916" stroke-width="3"/>
    <path d="M48 145h79m-64-12v24m50-24v24" stroke="#171916" stroke-width="4"/>
    <text x="43" y="207" font-family="ui-monospace,Consolas,monospace" font-size="15" font-weight="700">ACCESSIBLE WC</text>
  </g>

  <g id="service">
    <rect x="556" y="42" width="392" height="82" rx="7" fill="#252824"/>
    <rect x="650" y="145" width="298" height="77" rx="7" fill="#bd593e" stroke="#171916" stroke-width="3"/>
    <rect x="556" y="145" width="94" height="77" rx="7" fill="#d7ff3f" stroke="#171916" stroke-width="3"/>
    <text x="676" y="93" fill="#fffdf7" font-family="ui-monospace,Consolas,monospace" font-size="15">BACK BAR</text>
    <text x="580" y="183" font-family="ui-monospace,Consolas,monospace" font-size="11" transform="rotate(-90 580 183)">760mm</text>
    <text x="703" y="191" fill="#fffdf7" font-family="ui-monospace,Consolas,monospace" font-size="14">ORDER + PICK-UP</text>
  </g>

  <g id="tables" fill="#a57a59" stroke="#171916" stroke-width="3">
    <circle cx="376" cy="162" r="38"/><circle cx="420" cy="350" r="38"/><circle cx="617" cy="343" r="38"/><circle cx="818" cy="343" r="38"/>
  </g>
  <g id="chairs" fill="#6f8992" stroke="#171916" stroke-width="2">
    <rect x="359" y="104" width="34" height="27" rx="5"/><rect x="359" y="193" width="34" height="27" rx="5"/>
    <rect x="403" y="292" width="34" height="27" rx="5"/><rect x="403" y="381" width="34" height="27" rx="5"/>
    <rect x="600" y="285" width="34" height="27" rx="5"/><rect x="600" y="374" width="34" height="27" rx="5"/>
    <rect x="801" y="285" width="34" height="27" rx="5"/><rect x="801" y="374" width="34" height="27" rx="5"/>
  </g>

  <g id="turning" fill="#d7ff3f" fill-opacity=".2" stroke="#799100" stroke-width="3" stroke-dasharray="9 7">
    <circle cx="241" cy="386" r="68"/><circle cx="497" cy="222" r="68"/><circle cx="144" cy="126" r="68"/>
  </g>
  <g font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#566700">
    <text x="219" y="390">Ø1.5m</text><text x="475" y="226">Ø1.5m</text><text x="122" y="130">Ø1.5m</text>
  </g>

  <path d="M238 476C230 429 238 395 282 367s124-44 133-97 25-62 81-47 83 9 91-4" fill="none" stroke="#799100" stroke-width="12" stroke-linecap="round" stroke-dasharray="2 22" marker-end="url(#arrow)" opacity=".85"/>
  <text x="293" y="446" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#566700">CONTINUOUS ACCESSIBLE ROUTE ≥ 1.2m</text>

  <g stroke="#171916" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)">
    <path d="M25 488h950"/>
    <path d="M988 25v450"/>
  </g>
  <g font-family="ui-monospace,Consolas,monospace" font-size="14" font-weight="700" fill="#171916">
    <text x="481" y="493">10m</text>
    <text x="993" y="257" transform="rotate(90 993 257)">5m</text>
  </g>
</svg>
