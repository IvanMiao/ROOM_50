<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">ROOM/50 fixed-core floor plan</title>
  <desc id="desc">A ten by five metre café reference with a right-side entrance, a fixed rear core, an accessible WC, and a structural column.</desc>
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#77776f" stroke-width="1" opacity=".16"/>
    </pattern>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 0v12" stroke="#77776f" stroke-width="3" opacity=".25"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="m0 0 10 5-10 5z" fill="#171916"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="#f6f2e8"/>
  <rect width="1000" height="500" fill="url(#grid)"/>

  <g stroke="#171916" stroke-width="8" fill="none">
    <path d="M24 24H976V306m0 120v50H24V24"/>
  </g>
  <path d="M976 426a120 120 0 0 1-120-120" fill="none" stroke="#bd593e" stroke-width="4" stroke-dasharray="8 6"/>
  <path d="M976 426V306" stroke="#171916" stroke-width="5"/>

  <g font-family="ui-monospace,Consolas,monospace" fill="#171916">
    <text x="36" y="54" font-size="17" font-weight="700">ROOM/50 · FIXED REAR CORE · 10 × 5m</text>
    <text x="817" y="455" font-size="13">SIDE STEP-FREE ENTRY</text>
  </g>

  <g id="fixed-core">
    <path d="M24 24h258v225H24V24Z" fill="#dfdbd0" stroke="#171916" stroke-width="5"/>
    <path d="M282 24h178v142H282" fill="url(#hatch)" stroke="#171916" stroke-width="5"/>
    <text x="314" y="91" font-family="ui-monospace,Consolas,monospace" font-size="14" font-weight="700">FIXED STORE</text>
    <path d="M282 157v92h-92" fill="none" stroke="#171916" stroke-width="5"/>
    <path d="M190 249a92 92 0 0 1 92-92" fill="none" stroke="#bd593e" stroke-width="3" stroke-dasharray="7 6"/>
    <ellipse cx="86" cy="92" rx="29" ry="38" fill="#fffdf7" stroke="#171916" stroke-width="3"/>
    <path d="M48 145h79m-64-12v24m50-24v24" stroke="#171916" stroke-width="4"/>
    <text x="43" y="215" font-family="ui-monospace,Consolas,monospace" font-size="15" font-weight="700">ACCESSIBLE WC</text>
  </g>

  <g id="column">
    <rect x="475" y="247" width="54" height="54" fill="url(#hatch)" stroke="#171916" stroke-width="5"/>
    <text x="455" y="324" font-family="ui-monospace,Consolas,monospace" font-size="11" font-weight="700">FIXED COLUMN</text>
  </g>

  <g id="service">
    <rect x="538" y="43" width="390" height="76" rx="7" fill="#252824"/>
    <rect x="538" y="141" width="98" height="75" rx="7" fill="#d7ff3f" stroke="#171916" stroke-width="3"/>
    <rect x="636" y="141" width="292" height="75" rx="7" fill="#bd593e" stroke="#171916" stroke-width="3"/>
    <text x="681" y="89" fill="#fffdf7" font-family="ui-monospace,Consolas,monospace" font-size="15">BACK BAR</text>
    <text x="572" y="197" font-family="ui-monospace,Consolas,monospace" font-size="11" transform="rotate(-90 572 197)">760mm</text>
    <text x="690" y="188" fill="#fffdf7" font-family="ui-monospace,Consolas,monospace" font-size="14">ORDER + PICK-UP</text>
  </g>

  <g id="tables" fill="#a57a59" stroke="#171916" stroke-width="3">
    <circle cx="174" cy="365" r="38"/><circle cx="362" cy="375" r="38"/><circle cx="613" cy="366" r="38"/><circle cx="797" cy="354" r="38"/>
  </g>
  <g id="chairs" fill="#6f8992" stroke="#171916" stroke-width="2">
    <rect x="157" y="307" width="34" height="27" rx="5"/><rect x="157" y="396" width="34" height="27" rx="5"/>
    <rect x="345" y="317" width="34" height="27" rx="5"/><rect x="345" y="406" width="34" height="27" rx="5"/>
    <rect x="596" y="308" width="34" height="27" rx="5"/><rect x="596" y="397" width="34" height="27" rx="5"/>
    <rect x="780" y="296" width="34" height="27" rx="5"/><rect x="780" y="385" width="34" height="27" rx="5"/>
  </g>

  <g id="turning" fill="#d7ff3f" fill-opacity=".2" stroke="#799100" stroke-width="3" stroke-dasharray="9 7">
    <circle cx="879" cy="367" r="68"/><circle cx="684" cy="235" r="68"/><circle cx="145" cy="132" r="68"/>
  </g>
  <g font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#566700">
    <text x="857" y="371">Ø1.5m</text><text x="662" y="239">Ø1.5m</text><text x="123" y="136">Ø1.5m</text>
  </g>

  <path d="M976 366C908 370 842 330 807 295s-72-73-120-62-64 31-86 69-91 18-143 2-122-34-175-4-63-1-65-50" fill="none" stroke="#799100" stroke-width="12" stroke-linecap="round" stroke-dasharray="2 22" marker-end="url(#arrow)" opacity=".85"/>
  <text x="562" y="452" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#566700">CONTINUOUS ROUTE ≥ 1.2m</text>

  <g stroke="#171916" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)">
    <path d="M25 488h950"/><path d="M988 25v450"/>
  </g>
  <g font-family="ui-monospace,Consolas,monospace" font-size="14" font-weight="700" fill="#171916">
    <text x="481" y="493">10m</text><text x="993" y="257" transform="rotate(90 993 257)">5m</text>
  </g>
</svg>
